version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cloudstorage
      POSTGRES_PASSWORD: cloudstorage
      POSTGRES_DB: cloudstorage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudstorage"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["api-dev"]
    environment:
      VAULTBOX_DATABASE_URL: postgresql+asyncpg://cloudstorage:cloudstorage@postgres:5432/cloud_storage
      VAULTBOX_REDIS_URL: redis://redis:6379/0
      VAULTBOX_MINIO_ENDPOINT: minio:9000
      VAULTBOX_MINIO_ACCESS_KEY: minioadmin
      VAULTBOX_MINIO_SECRET_KEY: minioadmin
      VAULTBOX_CELERY_BROKER_URL: redis://redis:6379/1
      VAULTBOX_CELERY_RESULT_BACKEND: redis://redis:6379/2
      VAULTBOX_CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["celery-worker"]
    environment:
      VAULTBOX_DATABASE_URL: postgresql+asyncpg://cloudstorage:cloudstorage@postgres:5432/cloud_storage
      VAULTBOX_REDIS_URL: redis://redis:6379/0
      VAULTBOX_MINIO_ENDPOINT: minio:9000
      VAULTBOX_MINIO_ACCESS_KEY: minioadmin
      VAULTBOX_MINIO_SECRET_KEY: minioadmin
      VAULTBOX_CELERY_BROKER_URL: redis://redis:6379/1
      VAULTBOX_CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - backend

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["celery-beat"]
    environment:
      VAULTBOX_DATABASE_URL: postgresql+asyncpg://cloudstorage:cloudstorage@postgres:5432/cloud_storage
      VAULTBOX_REDIS_URL: redis://redis:6379/0
      VAULTBOX_CELERY_BROKER_URL: redis://redis:6379/1
      VAULTBOX_CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - backend

  frontend-app:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:

networks:
  default:
    name: cloud_storage

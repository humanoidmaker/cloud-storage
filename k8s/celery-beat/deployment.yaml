apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: cloud_storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: cloud_storage-backend:latest
          args: ["celery-beat"]
          envFrom:
            - configMapRef:
                name: cloud_storage-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: cloud_storage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: cloud_storage-backend:latest
          args: ["celery-worker"]
          envFrom:
            - configMapRef:
                name: cloud_storage-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
